name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Build with Maven
        run: mvn -f pom.xml clean package --batch-mode

      - name: Identify the built JAR file
        id: jar
        run: |
          JAR_FILE=$(ls target/*.jar | head -n 1)
          echo "jar_file=$JAR_FILE" >> $GITHUB_OUTPUT

      - name: Verify JAR file
        run: |
          ls -l ${{ steps.jar.outputs.jar_file }}
          file ${{ steps.jar.outputs.jar_file }}

      - name: Build Docker image
        run: |
          docker build -t my-spring-security-app -f DockerFile .
          docker tag my-spring-security-app jvlearning/my-spring-security-app:latest

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
            --username "${{ secrets.DOCKER_USERNAME }}" \
            --password-stdin

      - name: Push Docker image to Docker Hub
        run: docker push jvlearning/my-spring-security-app:latest
